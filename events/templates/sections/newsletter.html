{% load static %}

<section class="section" style="background: var(--np-bg);">
    <div class="container">
        <div class="np-card-solid" style="max-width: 48rem; margin: 0 auto; text-align: center;">
            <h3><i class="fas fa-envelope"></i> Subscribe to Our Newsletter</h3>
            <p class="text-muted" style="margin-bottom: 1.5rem;">Get the latest events and exclusive offers straight to your inbox.</p>
            <form method="POST" action="#" class="flex" style="flex-direction: column; gap: 1rem; max-width: 400px; margin: 0 auto;">
                {% csrf_token %}
                <div class="flex" style="gap: 0.5rem;">
                    <input type="email" name="email" placeholder="Enter your email address" class="np-input" required>
                    <button type="submit" class="btn-primary"><i class="fas fa-paper-plane"></i> Subscribe</button>
                </div>
            </form>
        </div>
    </div>
</section>
