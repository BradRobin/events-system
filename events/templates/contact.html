{% extends 'base.html' %}

{% block content %}
<div class="section">
    <div class="container" style="max-width: 800px;">
        <h2>Contact Us</h2>
        <div class="two-column">
            <div class="np-card-solid">
                <h3>Get in Touch</h3>
                <div class="flex items-center gap-3" style="margin-bottom: 1rem;"><span style="font-size:1.5rem">📧</span><div><strong>Email</strong><br><span class="text-sm">support@eventhub.com</span></div></div>
                <div class="flex items-center gap-3" style="margin-bottom: 1rem;"><span style="font-size:1.5rem">📞</span><div><strong>Phone</strong><br><span class="text-sm">+254 700 123 456</span></div></div>
                <div class="flex items-center gap-3"><span style="font-size:1.5rem">📍</span><div><strong>Address</strong><br><span class="text-sm">Nairobi, Kenya</span></div></div>
            </div>
            <div class="np-card-solid">
                <h3>Send a Message</h3>
                <form method="POST">
                    {% csrf_token %}
                    <div class="form-group"><label class="np-label">Name</label><input type="text" name="name" class="np-input" required></div>
                    <div class="form-group"><label class="np-label">Email</label><input type="email" name="email" class="np-input" required></div>
                    <div class="form-group"><label class="np-label">Message</label><textarea name="message" rows="5" class="np-input" required></textarea></div>
                    <button type="submit" class="btn-primary w-full">Send Message</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
